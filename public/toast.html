<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body {
    background: transparent;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'SF Mono', Menlo, Monaco, monospace;
    -webkit-user-select: none;
    user-select: none;
  }
  .toast {
    padding: 8px 24px;
    border-radius: 20px;
    background: #000000;
    border: none;
    color: #34d399;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
    animation: toast-life 0.8s ease both;
  }
  @keyframes toast-life {
    0% { opacity: 0; transform: translateY(8px) scale(0.95); }
    20% { opacity: 1; transform: translateY(0) scale(1); }
    70% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-4px) scale(0.97); }
  }
</style>
</head>
<body>
  <div class="toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    Copied
  </div>
</body>
</html>
