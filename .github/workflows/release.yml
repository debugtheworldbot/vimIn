name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Read version from package.json
        run: |
          APP_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Verify tag matches package.json version
        run: |
          if [ "${GITHUB_REF_NAME}" != "v${APP_VERSION}" ]; then
            echo "Expected tag v${APP_VERSION}, got ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Sync Tauri version files
        run: pnpm run sync-version

      - name: Build macOS app bundle
        run: |
          pnpm tauri build --bundles app

      - name: Re-sign app bundle with ad-hoc signature
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/VimInput.app"
          codesign --force --deep --sign - --entitlements src-tauri/entitlements.plist "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package signed app
        run: |
          mkdir -p dist-release
          ditto -c -k --keepParent src-tauri/target/release/bundle/macos/VimInput.app "dist-release/VimInput-${APP_VERSION}-macos.zip"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: "VimInput v${{ env.APP_VERSION }}"
          body: |
            Automated release for v${{ env.APP_VERSION }}

            Note: The macOS app is ad-hoc signed, not notarized.
            If Gatekeeper blocks launch, right-click the app and choose Open once.
          draft: false
          prerelease: ${{ contains(env.APP_VERSION, '-') }}
          files: dist-release/VimInput-${{ env.APP_VERSION }}-macos.zip
